name: Bug Report
description: Report a bug or unexpected behaviour in Genesis
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run /genesis
        2. Describe project as "..."
        3. Confirm plan
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Which phase did this occur in?
      options:
        - First-time setup
        - Phase 1 (Interview)
        - Phase 2 (Plan)
        - Phase 3 (Generate)
        - Phase 4 (Finalise)
        - Generated project (after scaffolding)
        - Other
    validations:
      required: true

  - type: input
    id: stack
    attributes:
      label: Stack
      description: What tech stack were you scaffolding? (e.g. Python/FastAPI, Go, Node/TypeScript)
      placeholder: Python/FastAPI

  - type: dropdown
    id: plan
    attributes:
      label: Claude Plan
      options:
        - Pro
        - Max
        - ProMax
        - API key
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Windows (native)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Output
      description: Paste any error messages, terminal output, or generated file contents.
      render: shell
